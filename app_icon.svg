<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#81D4FA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0288D1;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1024" height="1024" fill="url(#skyGradient)"/>
  
  <!-- Sun -->
  <g id="sun">
    <circle cx="750" cy="200" r="120" fill="#FFD54F"/>
    <!-- Sun rays -->
    <g stroke="#FFD54F" stroke-width="30" stroke-linecap="round">
      <line x1="750" y1="30" x2="750" y2="0"/>
      <line x1="750" y1="400" x2="750" y2="430"/>
      <line x1="920" y1="200" x2="950" y2="200"/>
      <line x1="580" y1="200" x2="550" y2="200"/>
      <line x1="880" y1="70" x2="900" y2="50"/>
      <line x1="620" y1="330" x2="640" y2="350"/>
      <line x1="880" y1="330" x2="900" y2="350"/>
      <line x1="620" y1="70" x2="640" y2="50"/>
    </g>
  </g>
  
  <!-- Cloud -->
  <g id="cloud">
    <!-- Main cloud shape -->
    <ellipse cx="350" cy="520" rx="200" ry="140" fill="white" opacity="0.95"/>
    <ellipse cx="250" cy="560" rx="150" ry="120" fill="white" opacity="0.95"/>
    <ellipse cx="450" cy="560" rx="150" ry="120" fill="white" opacity="0.95"/>
    <ellipse cx="350" cy="630" rx="220" ry="100" fill="white" opacity="0.95"/>
    
    <!-- Cloud highlight -->
    <ellipse cx="300" cy="480" rx="120" ry="80" fill="white" opacity="0.3"/>
  </g>
  
  <!-- Rain drops from cloud -->
  <g id="rain" stroke="#0288D1" stroke-width="25" stroke-linecap="round" fill="none">
    <line x1="200" y1="660" x2="200" y2="780"/>
    <line x1="350" y1="680" x2="350" y2="800"/>
    <line x1="500" y1="660" x2="500" y2="780"/>
  </g>
  
  <!-- Additional decorative elements -->
  <circle cx="350" cy="520" r="3" fill="none"/>
  
  <!-- Optional: Corner accent -->
  <circle cx="920" cy="920" r="80" fill="white" opacity="0.1"/>
</svg>